name: recover-key

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  wrap:
    runs-on: ubuntu-latest
    steps:
      - name: Wrap the signing key with a passphrase
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          WRAP_PASSPHRASE: ${{ secrets.WRAP_PASSPHRASE }}
        run: |
          if [ "${#WRAP_PASSPHRASE}" -lt 16 ]; then
            echo "WRAP_PASSPHRASE secret is missing or shorter than 16 chars — aborting."
            exit 1
          fi
          printf '%s' "$GPG_PRIVATE_KEY" > key.asc
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$WRAP_PASSPHRASE" \
              --symmetric --cipher-algo AES256 \
              --output key.asc.gpg key.asc
          shred -u key.asc

      - uses: actions/upload-artifact@v4
        with:
          name: wrapped-key
          path: key.asc.gpg
          retention-days: 1
